packages:
  - "packages/*"

# ── Supply-chain hardening ──────────────────────────────────────────────
# Block packages published less than 7 days ago. The chalk/debug-class
# attacks are typically caught and pulled within hours to days.
minimumReleaseAge: 10080
minimumReleaseAgeExclude: []

# Refuse to install a dep that lost its trusted-publisher / provenance
# signal between releases (pnpm 10.21+).
trustPolicy: no-downgrade

# Block git://, http(s)://, and tarball: sub-dependencies.
blockExoticSubdeps: true

# Hard-fail (not warn) if any dep tries to run a build script.
# With no native deps, nothing should.
strictDepBuilds: true

# Never run lifecycle scripts unless explicitly allowlisted.
ignoreScripts: true

# Exact resolutions on every install (no silent caret upgrades).
saveExact: true

# CI-style lockfile consistency: fail if lockfile drifts from package.json.
preferFrozenLockfile: true

# Don't auto-install peer deps — keep the graph explicit.
autoInstallPeers: false

# Retry transient registry errors.
fetchRetries: 3

# ── vite-plus version alignment ─────────────────────────────────────────
# vite-plus aliases `vite` to its own core build so every transitive dep
# resolves to it. As of vite-plus 0.2.0 the rebundled `vite-plus-test`
# package was removed; `vitest` is now the real upstream package, pulled in
# directly as a dependency of `vite-plus`, so it is no longer overridden.
overrides:
  vite: "npm:@voidzero-dev/vite-plus-core@0.2.1"
