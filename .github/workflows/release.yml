name: Release

# Publishes plainfp to npm using OIDC trusted publishing with provenance.
# No NPM_TOKEN secret required — configure the trusted publisher on npmjs.com
# (Package settings → Publishing access) and point it at this workflow.
#
# To cut a release, run locally from the repo root:
#   pnpm release
#
# That invokes changelogen in packages/plainfp, which bumps the version,
# updates CHANGELOG.md, commits, tags (v0.1.0), and pushes. The pushed tag
# fires this workflow.

on:
  push:
    tags:
      - "v*"

# Serialize releases so two tags can't publish concurrently.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Deny by default at the workflow level; the publish job grants exactly what it needs.
permissions: {}

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for npm provenance via OIDC
      contents: write # for creating the GitHub Release below
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org
          # No package-manager cache in the publish workflow: a poisoned cache
          # could tamper with the artifact we publish (zizmor cache-poisoning).
          package-manager-cache: false

      - run: pnpm install --frozen-lockfile

      - name: Verify tag matches package.json version
        working-directory: packages/plainfp
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag v$TAG_VERSION does not match package.json version $PKG_VERSION" >&2
            exit 1
          fi

      - run: pnpm -r run typecheck
      - run: pnpm -r run lint
      - run: pnpm -r run test
      - run: pnpm -r run build
      - name: Check packaging hygiene (publint + attw)
        working-directory: packages/plainfp
        run: |
          pnpm dlx publint
          pnpm dlx @arethetypeswrong/cli@0.18.3 --pack . --profile esm-only

      - name: Publish with provenance
        working-directory: packages/plainfp
        run: pnpm publish --provenance --access public --no-git-checks

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: packages/plainfp
        run: pnpm dlx changelogen@0.6.2 gh release
