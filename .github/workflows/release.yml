name: Release

# Publishes plainfp to npm using OIDC trusted publishing with provenance.
# No NPM_TOKEN secret required — configure the trusted publisher on npmjs.com
# (Package settings → Publishing access) and point it at this workflow.
#
# To cut a release, run locally from the repo root:
#   pnpm release
#
# That invokes changelogen in packages/plainfp, which bumps the version,
# updates CHANGELOG.md, commits, tags (v0.1.0), and pushes. The pushed tag
# fires this workflow.

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for npm provenance via OIDC
      contents: write # for creating the GitHub Release below
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 25
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Verify tag matches package.json version
        working-directory: packages/plainfp
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag v$TAG_VERSION does not match package.json version $PKG_VERSION" >&2
            exit 1
          fi

      - run: pnpm -r run typecheck
      - run: pnpm -r run lint
      - run: pnpm -r run test
      - run: pnpm -r run build
      - name: Check packaging hygiene (publint + attw)
        working-directory: packages/plainfp
        run: |
          pnpm dlx publint
          pnpm dlx @arethetypeswrong/cli@0.18.2 --pack . --profile esm-only

      - name: Publish with provenance
        working-directory: packages/plainfp
        run: pnpm publish --provenance --access public --no-git-checks

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: packages/plainfp
        run: pnpm dlx changelogen@0.6.2 gh release
